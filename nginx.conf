events {
    worker_connections 1024;
}

http {
    # Rate limit zones (must be at http level)
    # Chat endpoints: 10 req/min per IP — most expensive (AI API calls)
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;
    # Login endpoint: 5 req/min per IP — brute force prevention
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    # General API: 60 req/min per IP — baseline DDoS protection
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    limit_req_status 429;

    server {
        listen 80;
        client_max_body_size 55M;

        # Owner-specific chat stream endpoint (primary public endpoint)
        location ~ ^/api/owners/[^/]+/chat/stream$ {
            limit_req zone=chat_limit burst=3 nodelay;
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        # Legacy chat stream endpoint
        location = /api/chat/stream {
            limit_req zone=chat_limit burst=3 nodelay;
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        # Admin login endpoint — strict rate limit to prevent brute force
        location = /api/admin/auth/login {
            limit_req zone=login_limit burst=2 nodelay;
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other API traffic — general rate limit catchall
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        # Frontend — Next.js
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
