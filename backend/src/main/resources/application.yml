server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/showassistant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  ai:
    # Ollama 本地模型配置（ai.provider=ollama 时使用）
    ollama:
      base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${AI_OLLAMA_MODEL:qwen2.5:7b}
    # Claude 云端模型配置（ai.provider=claude 时使用）
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:placeholder}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 2048
    # Google AI Studio（Gemini）云端模型配置（ai.provider=google 时使用）
    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY:placeholder}
        chat:
          options:
            model: ${GOOGLE_AI_MODEL:gemini-2.5-flash-lite}
        # Phase 3: Google text-embedding-004 向量嵌入（768 维）
        embedding:
          options:
            model: text-embedding-004

# TDD 4.5.4 — AI 提供商切换配置
# ai.provider=ollama（默认）：始终调用本地 Ollama，ai.mock 对此无效
# ai.provider=claude + ai.mock=false：调用 Claude API（需设置 ANTHROPIC_API_KEY）
# ai.provider=claude + ai.mock=true（默认）：返回模拟数据，无需 API Key
# ai.provider=google + ai.mock=false：调用 Google AI Studio Gemini（需设置 GOOGLE_AI_API_KEY）
# ai.provider=google + ai.mock=true（默认）：返回模拟数据，无需 API Key
ai:
  mock: ${AI_MOCK:false}
  provider: ${AI_PROVIDER:google}

app:
  sse:
    timeout-ms: 180000
  # 管理端 JWT 认证
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBKV1QgdGVzdGluZw==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  # 管理员账号（密码使用 BCrypt 哈希，默认: admin / admin123）
  admin:
    username: ${ADMIN_USERNAME:admin}
    password-hash: ${ADMIN_PASSWORD_HASH:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}
  # 文件上传存储路径
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}

logging:
  level:
    com.showassistant: DEBUG
    org.springframework.ai: INFO
