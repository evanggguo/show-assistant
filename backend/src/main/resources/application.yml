server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      # Disable Ollama embedding auto-configuration; use Google text-embedding-004 as EmbeddingModel
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dossier}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  ai:
    # Ollama local model configuration (used when ai.provider=ollama)
    ollama:
      base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${AI_OLLAMA_MODEL:qwen2.5:7b}
    # Claude cloud model configuration (used when ai.provider=claude)
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:placeholder}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 2048
    # Google AI Studio (Gemini) cloud model configuration (used when ai.provider=google)
    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY:placeholder}
        chat:
          options:
            model: ${GOOGLE_AI_MODEL:gemini-2.5-flash-lite}
        # Google text-embedding-004 vector embedding (768 dimensions)
        embedding:
          options:
            model: gemini-embedding-001
    # Vertex AI Gemini (GCP cloud model, auto-activated on GCP via ADC; no API key required)
    # project-id resolves to empty string when GOOGLE_CLOUD_PROJECT is not set (non-GCP environments),
    # which prevents VertexAiGeminiChatModel auto-configuration from initializing on startup.
    vertex:
      ai:
        gemini:
          project-id: ${GOOGLE_CLOUD_PROJECT:}
          location: ${VERTEX_AI_LOCATION:us-central1}
          chat:
            options:
              model: ${GOOGLE_AI_MODEL:gemini-2.5-flash-lite}
    model:
      embedding:
        text: google-genai  # explicitly enable Google text-embedding-004

# TDD 4.5.4 — AI provider switching configuration
# ai.provider=ollama: always calls local Ollama; ai.mock has no effect
# ai.provider=claude + ai.mock=false: calls Claude API (requires ANTHROPIC_API_KEY)
# ai.provider=claude + ai.mock=true (default): returns mock data, no API key needed
# ai.provider=google + ai.mock=false: calls Google AI Studio Gemini (requires GOOGLE_AI_API_KEY)
# ai.provider=google + ai.mock=true (default): returns mock data, no API key needed
ai:
  mock: ${AI_MOCK:false}
  provider: ${AI_PROVIDER:google}

app:
  sse:
    timeout-ms: 180000
  ai-budget:
    daily-max-calls: ${AI_DAILY_MAX_CALLS:500}
  rate-limit:
    chat:
      per-minute: ${RATE_LIMIT_CHAT_PER_MINUTE:10}
      burst: ${RATE_LIMIT_CHAT_BURST:3}
    login:
      per-minute: ${RATE_LIMIT_LOGIN_PER_MINUTE:5}
      burst: ${RATE_LIMIT_LOGIN_BURST:2}
    conversation:
      per-hour: ${RATE_LIMIT_CONVERSATION_PER_HOUR:30}
  # Admin console JWT authentication
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBKV1QgdGVzdGluZw==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  # Super-admin tokens (used for /api/super-admin/** endpoints; must be supplied via environment variables)
  # SUPER_ADMIN_PASSWORD       — add-only access (list + create)
  # SUPER_ADMIN_FULL_ACCESS_PASSWORD — full access (list + create + delete)
  super-admin:
    password: ${SUPER_ADMIN_PASSWORD}
    full-access-password: ${SUPER_ADMIN_FULL_ACCESS_PASSWORD}
  # File upload storage path
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}

logging:
  level:
    com.dossier: DEBUG
    org.springframework.ai: INFO
