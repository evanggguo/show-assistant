server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/showassistant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    # Ollama 本地模型配置（ai.provider=ollama 时使用）
    ollama:
      base-url: ${AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${AI_OLLAMA_MODEL:qwen2.5:7b}
    # Claude 云端模型配置（ai.provider=claude 时使用）
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:placeholder}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 2048

# TDD 4.5.4 — AI 提供商切换配置
# ai.mock=true（默认）：返回模拟数据，无需任何外部服务
# ai.mock=false + ai.provider=ollama：调用本地 Ollama（需启动 Ollama 并拉取模型）
# ai.mock=false + ai.provider=claude：调用 Claude API（需设置 ANTHROPIC_API_KEY）
ai:
  mock: ${AI_MOCK:true}
  provider: ${AI_PROVIDER:ollama}

app:
  sse:
    timeout-ms: 180000

logging:
  level:
    com.showassistant: DEBUG
    org.springframework.ai: INFO
