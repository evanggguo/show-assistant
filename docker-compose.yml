services:

  # ─── PostgreSQL + pgvector ───────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: showassistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: showassistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d showassistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot 后端 ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: showassistant-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/showassistant
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      AI_MOCK: ${AI_MOCK:-true}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      AI_OLLAMA_BASE_URL: ${AI_OLLAMA_BASE_URL:-http://ollama:11434}
      AI_OLLAMA_MODEL: ${AI_OLLAMA_MODEL:-qwen2.5:1.5b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-placeholder}
      GOOGLE_AI_MODEL: ${GOOGLE_AI_MODEL:-gemini-2.0-flash}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SPRING_MVC_ASYNC_REQUEST_TIMEOUT: -1
      JWT_SECRET: ${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBKV1QgdGVzdGluZw==}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/owner/profile || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Next.js 前端 ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
    container_name: showassistant-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx 反向代理 ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: showassistant-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  # ─── Ollama 本地模型 ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: showassistant-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
  uploads_data:
