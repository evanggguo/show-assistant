services:

  # ─── PostgreSQL + pgvector ───────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dossier-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dossier
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dossier"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dossier-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/dossier
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      AI_MOCK: ${AI_MOCK:-true}
      AI_PROVIDER: ${AI_PROVIDER:-google}
      AI_OLLAMA_BASE_URL: ${AI_OLLAMA_BASE_URL:-http://ollama:11434}
      AI_OLLAMA_MODEL: ${AI_OLLAMA_MODEL:-qwen2.5:1.5b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-placeholder}
      GOOGLE_AI_MODEL: ${GOOGLE_AI_MODEL:-gemini-2.5-flash-lite}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      VERTEX_AI_LOCATION: ${VERTEX_AI_LOCATION:-us-central1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SPRING_MVC_ASYNC_REQUEST_TIMEOUT: -1
      JWT_SECRET: ${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBKV1QgdGVzdGluZw==}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SUPER_ADMIN_FULL_ACCESS_PASSWORD: ${SUPER_ADMIN_FULL_ACCESS_PASSWORD}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: $$2b$$10$$FVpHmUIJWObLzgzPiPHhWOIxEd0YCEDjW.457yaQoU1Wt8VIDSkka
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Next.js Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
    container_name: dossier-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dossier-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  # ─── Ollama Local Model (optional, only needed when AI_PROVIDER=ollama) ────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: dossier-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  postgres_data:
  uploads_data:
