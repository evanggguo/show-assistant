services:

  # ─── PostgreSQL + pgvector ───────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: showassistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: showassistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d showassistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot 后端 ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: showassistant-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/showassistant
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # AI 提供商切换（默认 mock 模式，无需外部服务）
      AI_MOCK: ${AI_MOCK:-true}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      # Ollama 地址：Docker 网络内访问宿主机 Ollama（Mac/Windows）
      # Linux 宿主机请替换为实际 IP，如 http://172.17.0.1:11434
      AI_OLLAMA_BASE_URL: ${AI_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AI_OLLAMA_MODEL: ${AI_OLLAMA_MODEL:-qwen2.5:7b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Next.js 前端 ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: showassistant-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ─── Ollama 本地模型（可选）────────────────────────────────────────────
  # 如果宿主机已安装 Ollama，无需此服务；否则取消以下注释启用容器内 Ollama
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: showassistant-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   # GPU 加速（需要 NVIDIA Container Toolkit）
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

volumes:
  postgres_data:
  # ollama_data:
